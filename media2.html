<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio_video</title>
</head>

<style>
    body{
        padding: 0px;
        margin: 0px;

    }
    header{
        font-size:50px;
        text-transform: uppercase;
        background: #00000048;
        margin-top: 20px;
        text-align:center;
        box-sizing: border-box;
        padding:10px;
        

    }
    #text{
        color: rgb(255, 255, 255);
   
    }
    video{
        width: 100%;
        position:fixed;
        left:0px;
        top: 0px;
        z-index:-1;

    }
  
</style>
<body>
<header>
    <span id="text">Rainbow</span>
</header>
<video autoplay loop muted>
    <source src="images/v1.mp4" type="video/mp4">
    <h2>update your browser/ This video is not supported in your web browser</h2>
</video>

    
</body>
</html>

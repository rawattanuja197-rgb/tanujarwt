<title>list in html</title>
<style>
 
@keyframes blink
{
from{opacity:0;color:yellow;}
to{opacity:1;color:red;}

}

header
{
text-align:center;
box-sizing:border-box;
background:black;
padding:30px;
color:white;
font-size:50px;
box-shadow:10px 10px 10px gray;
margin-top:10px;
height:100px;


}

#my
{
color:white;
transition:0.50s;

animation:blink 1s infinite alternate;
}


</style>


<header>

<span id="my">List in html</span>

</header>

<body>
<main>
<h1>
<!--style of list-->


<ol style="list-style-images:url()">
<li>India</li>
<li>japan</li>
<li>Nepal</li>
<li>south korea</li>
<li>Thailand</li>
</ol>


<ol style="list-style:none;padding:0px;">
<li>India</li>
<li>japan</li>
<li>Nepal</li>
<li>south korea</li>
<li>Thailand</li>
</ol>

<ol style="list-style:none;padding:0px;">
<li>India</li>
<li>japan</li>
<li>Nepal</li>
<li>south korea</li>
<li>Thailand</li>
</ol>


</main>
</body>

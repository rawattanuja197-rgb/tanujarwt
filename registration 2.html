<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
</head>
<link href="main.css" rel="stylesheet" type="text/css">
 
</style>
<nav></nav>
<body>
    <header>
        <h1 class="textstyle"></h1>
    </header>
    <main>
        <table border="0" cellpadding="10">
            <caption>Registration <from:get></form:get></form:get></caption>
            <form action="http://tatplay/user/login.php" Method="post">
            <tr>
                <td><label for="forname">Name</label></td>
                <td><input  title="type name here" placeholder="type first name" id="forname" type="text" required ></td>
            
            </tr>
            <tr>
                <td><label>message</label></td>
                <td>
                    <textarea rows="10" cols="40"></textarea>
                </td>
            </tr>
            <tr>
                <td><label>gender</label></td>
                <td>
                    Male<input type="radio" value="male" name="gender">
                    female<input type="radio" value="female" name="gender">
                    others<input type="radio" value="others" name="gender">

                </td>
            </tr>
            <tr>
                <td>
                    <label>Hobby</label>

                </td>
                <td>
                    Reading<input type="checkbox" value="reading">
                    Writing<input type="checkbox" value="writing">
                    Dancing<input type="checkbox" value="dancing">
                </td>
            </tr>
            <tr>
                <td>
                    <label>Country</label>
                </td>
                <td>
                    <select>
                        <option value="India">India</option>
                        <option value="Japan">Japan</option>
                        <option value="Thailand">Thailand</option>
                        <option value="china">China</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><label>E-mail</label></td>
                <td>
                    <input type="email">
                </td>
            </tr>
            <tr>
                <td><label>Upload picture</label></td>
                <td>
                    <input type="file">
                </td>
            </tr>
            <tr>
                <td><label>DOB</label></td>
                <td>
                    <input type="date">
                </td>
            </tr>
            <tr>
                <td><label>Time</label></td>
                <td>
                    <input type="time">
                </td>
            </tr>
            <tr>
                <td></td>
                <td>
                    <input type="submit" value="Submit">
                    <input type="Reset">
                </td>
            </tr>
            </form>
        </table>
    </main>
</body>
</html>

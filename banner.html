<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>profile</title>
</head>
<style>
    @keyframes runtext
    {
        from{left:-500px;}
        to{left:1400px;}
    }

    @keyframes changepic
    {
        10%{background-image:url(images/f1.jpg);}
        20%{background-image:url(images/f2.jpg);}
        30%{background-image:url(images/f3.jpg);}
        40%{background-image:url(images/fhul.jpg);}
        50%{background-image:url(images/ful.jpg);}
        60%{background-image:url(images/gulab.jpg);}
        70%{background-image:url(images/f8.png);}
        80%{background-image:url(images/f4.jpg);}
        90%{background-image:url(images/f6.jpg);}
        100%{background-image:url(images/f7.jpg);}
    }
    @keyframes mycolor
    {
        10%{color:aliceblue;}
        30%{color:rgb(170, 185, 197);}
        50%{color:rgb(137, 165, 190);}
        70%{color:rgb(95, 136, 172);}
    }
    header{
        background:black;
        background-image:url(images/pool.jpg);
        background-repeat: no-repeat;
        background-size: 100% 100%;
        height:600px;
        color:white;
        width:90%;
        margin:auto;
        overflow:hidden;
        animation:changepic 12s linear infinite;
    }
    #text
    {
        margin-top:5px;
        padding-top:30px;
        font-family:arial black;
        font-size:50px;
        color:bisque;
        text-shadow:5px 5px 5px black;
        text-transform:uppercase;
        //background:yellow;
        position:relative;
        left:-500px;
        top:100px;
        animation:runtext 32s linear infinite alternate,mycolor 2s infinite;


    }
</style>
<body>
<header>
 <div id="text">welcome to nature care</div></header>

    
</body>
</html>
